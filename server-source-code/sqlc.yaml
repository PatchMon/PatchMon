version: "2"

sql:
  - engine: "postgresql"
    schema: "internal/sqlc/schema"
    queries: "internal/sqlc/queries"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
