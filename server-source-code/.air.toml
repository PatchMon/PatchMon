root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/patchmon-server ./cmd/server"
  bin = "./tmp/patchmon-server"
  full_bin = "./tmp/patchmon-server"
  include_ext = ["go", "sql"]
  exclude_dir = ["tmp", "vendor", "node_modules"]
  exclude_regex = ["_test\\.go$"]
  delay = 1000

[log]
  time = false

[misc]
  clean_on_exit = true
