name: "Bug Report"
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please provide as much detail as possible.

  - type: dropdown
    id: installation_method
    attributes:
      label: What is the installation method of your PatchMon server?
      options:
        - ""
        - Docker
        - Proxmox-community script
        - setup.sh native install script
        - Other
    validations:
      required: true

  - type: input
    id: patchmon_version
    attributes:
      label: What is the version of your PatchMon server?
      placeholder: "e.g. 1.4.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      placeholder: Screenshots, logs, or any other relevant information
    validations:
      required: false
